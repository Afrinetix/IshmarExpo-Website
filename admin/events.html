<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Events | Ishmar Expo Admin</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="css/admin.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" id="sidebar-root"></aside>
    <div class="main">
      <header class="topbar" id="topbar-root"></header>
      <div class="content">

        <div class="panel" id="event-form-panel" style="display:none;">
          <div class="panel-header">
            <div class="panel-title" id="event-form-title">New Event</div>
            <button class="btn btn-ghost btn-sm" id="event-form-close"><i class="fas fa-xmark"></i> Close</button>
          </div>
          <div class="panel-body">
            <form id="event-form">
              <input type="hidden" id="event-id" />
              <div class="form-grid">
                <div class="field">
                  <label for="event-title">Title *</label>
                  <input type="text" id="event-title" required />
                </div>
                <div class="field">
                  <label for="event-slug">URL Slug</label>
                  <input type="text" id="event-slug" placeholder="auto-generated from title" />
                </div>
              </div>

              <div class="field">
                <label for="event-description">Description</label>
                <textarea id="event-description" rows="4"></textarea>
              </div>

              <div class="field">
                <label for="event-category">Category</label>
                <select id="event-category">
                  <option value="halal">Halal Expo</option>
                  <option value="empowerment">Empowerment</option>
                  <option value="certification">Certification</option>
                  <option value="corporate">Corporate</option>
                </select>
                <div class="field-hint">Drives the category filter tabs on the public Events page.</div>
              </div>

              <div class="field">
                <label for="event-image-file">Poster Image</label>
                <div class="file-drop" id="event-image-drop">
                  <i class="fas fa-image" style="font-size:22px; margin-bottom:8px; display:block;"></i>
                  <span id="event-image-label">Click to choose an image (JPG/PNG/WebP, max 10MB)</span>
                  <input type="file" id="event-image-file" accept="image/jpeg,image/png,image/webp,image/avif" />
                </div>
                <img id="event-image-preview" style="display:none; margin-top:12px; max-height:140px; border-radius:8px;" />
              </div>

              <div class="form-grid">
                <div class="field">
                  <label for="event-start">Start Date/Time *</label>
                  <input type="datetime-local" id="event-start" required />
                </div>
                <div class="field">
                  <label for="event-end">End Date/Time *</label>
                  <input type="datetime-local" id="event-end" required />
                </div>
              </div>

              <div class="form-grid">
                <div class="field">
                  <label for="event-venue">Venue</label>
                  <input type="text" id="event-venue" placeholder="e.g. Diamond Plaza 1, Parklands, Nairobi" />
                </div>
                <div class="field">
                  <label for="event-map">Google Maps URL</label>
                  <input type="url" id="event-map" placeholder="https://maps.google.com/..." />
                </div>
              </div>

              <div class="form-grid">
                <div class="field">
                  <label for="event-reg-link">Registration Link</label>
                  <input type="url" id="event-reg-link" placeholder="https:// or leave blank" />
                </div>
                <div class="field">
                  <label for="event-reg-deadline">Registration Deadline</label>
                  <input type="datetime-local" id="event-reg-deadline" />
                </div>
              </div>

              <div class="form-grid single">
                <div class="checkbox-field field"><input type="checkbox" id="event-featured" /><label for="event-featured">Feature this event on the homepage</label></div>
                <div class="checkbox-field field"><input type="checkbox" id="event-published" /><label for="event-published">Published (visible on the public site)</label></div>
              </div>

              <div class="modal-actions" style="justify-content:flex-start;">
                <button type="submit" class="btn btn-primary" id="event-save-btn"><i class="fas fa-check"></i> Save Event</button>
                <button type="button" class="btn btn-ghost" id="event-form-cancel">Cancel</button>
              </div>
            </form>
          </div>
        </div>

        <div class="panel">
          <div class="panel-header">
            <div class="panel-title">All Events</div>
            <button class="btn btn-primary btn-sm" id="new-event-btn"><i class="fas fa-plus"></i> New Event</button>
          </div>
          <div class="table-wrap">
            <table class="data-table">
              <thead>
                <tr><th></th><th>Title</th><th>Dates</th><th>Venue</th><th>Featured</th><th>Published</th><th></th></tr>
              </thead>
              <tbody id="events-tbody">
                <tr><td colspan="7" class="state-msg"><span class="spinner"></span></td></tr>
              </tbody>
            </table>
          </div>
        </div>

      </div>
    </div>
  </div>

  <div id="toast-stack"></div>

  <script type="module">
    import { initShell, toast, toastError, confirmModal, escapeHtml, safeUrl } from './js/dashboard-shell.js';
    import { getAllEventsForAdmin, createEvent, updateEvent, deleteEvent } from '../supabase/events.js';
    import { uploadFile, deleteFile, pathFromPublicUrl, BUCKETS } from '../supabase/storage.js';
    import { hasPermission } from '../supabase/auth.js';

    const profile = await initShell({ active: 'events.html', title: 'Events' });
    if (!profile) throw new Error('redirecting');

    const canWrite = hasPermission('events', 'write', profile.role);
    const canDelete = hasPermission('events', 'delete', profile.role);
    if (!canWrite) document.getElementById('new-event-btn').style.display = 'none';

    const panel = document.getElementById('event-form-panel');
    const form = document.getElementById('event-form');
    let pendingImageFile = null;
    let events = [];

    function fmtDate(iso) {
      return new Date(iso).toLocaleString('en-KE', { day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
    }
    function toLocalInput(iso) {
      if (!iso) return '';
      const d = new Date(iso);
      d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
      return d.toISOString().slice(0, 16);
    }
    function slugify(str) {
      return str.toLowerCase().trim().replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '');
    }

    function openForm(event = null) {
      form.reset();
      pendingImageFile = null;
      document.getElementById('event-image-preview').style.display = 'none';
      document.getElementById('event-id').value = event?.id || '';
      document.getElementById('event-form-title').textContent = event ? 'Edit Event' : 'New Event';
      document.getElementById('event-title').value = event?.title || '';
      document.getElementById('event-slug').value = event?.slug || '';
      document.getElementById('event-description').value = event?.description || '';
      document.getElementById('event-category').value = event?.category || 'halal';
      document.getElementById('event-start').value = toLocalInput(event?.start_date);
      document.getElementById('event-end').value = toLocalInput(event?.end_date);
      document.getElementById('event-venue').value = event?.venue || '';
      document.getElementById('event-map').value = event?.venue_map_url || '';
      document.getElementById('event-reg-link').value = event?.registration_link || '';
      document.getElementById('event-reg-deadline').value = toLocalInput(event?.registration_deadline);
      document.getElementById('event-featured').checked = !!event?.featured;
      document.getElementById('event-published').checked = !!event?.published;
      if (event?.image) {
        const preview = document.getElementById('event-image-preview');
        preview.src = event.image;
        preview.style.display = 'block';
      }
      panel.style.display = 'block';
      panel.scrollIntoView({ behavior: 'smooth' });
    }
    function closeForm() {
      panel.style.display = 'none';
      form.reset();
    }

    document.getElementById('new-event-btn').addEventListener('click', () => openForm());
    document.getElementById('event-form-close').addEventListener('click', closeForm);
    document.getElementById('event-form-cancel').addEventListener('click', closeForm);

    document.getElementById('event-title').addEventListener('input', (e) => {
      const slugField = document.getElementById('event-slug');
      if (!slugField.dataset.touched) slugField.value = slugify(e.target.value);
    });
    document.getElementById('event-slug').addEventListener('input', (e) => { e.target.dataset.touched = '1'; });

    const dropZone = document.getElementById('event-image-drop');
    const fileInput = document.getElementById('event-image-file');
    dropZone.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', () => {
      const file = fileInput.files[0];
      if (!file) return;
      pendingImageFile = file;
      document.getElementById('event-image-label').textContent = file.name;
      const preview = document.getElementById('event-image-preview');
      preview.src = URL.createObjectURL(file);
      preview.style.display = 'block';
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const saveBtn = document.getElementById('event-save-btn');
      saveBtn.disabled = true;
      try {
        const id = document.getElementById('event-id').value || null;
        const existing = id ? events.find((ev) => ev.id === id) : null;

        let imageUrl = existing?.image || null;
        if (pendingImageFile) {
          // Event posters share the `gallery` bucket (no dedicated "events"
          // bucket exists in the spec) under an events/ folder.
          const { publicUrl } = await uploadFile(BUCKETS.GALLERY, pendingImageFile, { folder: 'events' });
          imageUrl = publicUrl;
        }

        const start = document.getElementById('event-start').value;
        const end = document.getElementById('event-end').value;
        if (new Date(end) < new Date(start)) {
          toast('End date/time must be after the start date/time.', 'error');
          return;
        }

        const payload = {
          title: document.getElementById('event-title').value.trim(),
          slug: document.getElementById('event-slug').value.trim() || slugify(document.getElementById('event-title').value),
          description: document.getElementById('event-description').value.trim() || null,
          category: document.getElementById('event-category').value,
          image: imageUrl,
          start_date: new Date(start).toISOString(),
          end_date: new Date(end).toISOString(),
          venue: document.getElementById('event-venue').value.trim() || null,
          venue_map_url: document.getElementById('event-map').value.trim() || null,
          registration_link: document.getElementById('event-reg-link').value.trim() || null,
          registration_deadline: document.getElementById('event-reg-deadline').value
            ? new Date(document.getElementById('event-reg-deadline').value).toISOString() : null,
          featured: document.getElementById('event-featured').checked,
          published: document.getElementById('event-published').checked,
        };

        if (id) {
          await updateEvent(id, payload);
          toast('Event updated.');
        } else {
          await createEvent({ ...payload, created_by: profile.id });
          toast('Event created.');
        }
        closeForm();
        await loadEvents();
      } catch (err) {
        toastError(err);
      } finally {
        saveBtn.disabled = false;
      }
    });

    async function handleDelete(event) {
      const ok = await confirmModal({
        title: 'Delete this event?',
        text: `"${event.title}" and its registrations will be permanently removed. This can't be undone.`,
      });
      if (!ok) return;
      try {
        await deleteEvent(event.id);
        if (event.image) {
          const path = pathFromPublicUrl(BUCKETS.GALLERY, event.image);
          if (path) await deleteFile(BUCKETS.GALLERY, path).catch(() => {});
        }
        toast('Event deleted.');
        await loadEvents();
      } catch (err) {
        toastError(err);
      }
    }

    async function togglePublished(event, field) {
      try {
        await updateEvent(event.id, { [field]: !event[field] });
        await loadEvents();
      } catch (err) {
        toastError(err);
      }
    }

    async function loadEvents() {
      const tbody = document.getElementById('events-tbody');
      try {
        events = await getAllEventsForAdmin();
        if (!events.length) {
          tbody.innerHTML = '<tr><td colspan="7" class="state-msg"><i class="fas fa-calendar-xmark"></i>No events yet — create your first one.</td></tr>';
          return;
        }
        tbody.innerHTML = events.map((ev) => `
          <tr>
            <td>${ev.image ? `<img src="${escapeHtml(safeUrl(ev.image))}" class="table-thumb" alt="" />` : ''}</td>
            <td><strong>${escapeHtml(ev.title)}</strong></td>
            <td>${fmtDate(ev.start_date)}</td>
            <td>${escapeHtml(ev.venue) || '—'}</td>
            <td>${canWrite ? `<label class="switch"><input type="checkbox" data-toggle="featured" data-id="${ev.id}" ${ev.featured ? 'checked' : ''}/><span class="switch-track"></span></label>` : (ev.featured ? '<span class="badge badge-gold">Yes</span>' : '—')}</td>
            <td>${canWrite ? `<label class="switch"><input type="checkbox" data-toggle="published" data-id="${ev.id}" ${ev.published ? 'checked' : ''}/><span class="switch-track"></span></label>` : (ev.published ? '<span class="badge badge-success">Yes</span>' : '<span class="badge badge-gray">No</span>')}</td>
            <td class="table-actions">
              ${canWrite ? `<button class="btn btn-outline btn-icon" data-edit="${ev.id}" title="Edit"><i class="fas fa-pen"></i></button>` : ''}
              ${canDelete ? `<button class="btn btn-danger btn-icon" data-delete="${ev.id}" title="Delete"><i class="fas fa-trash"></i></button>` : ''}
            </td>
          </tr>`).join('');

        tbody.querySelectorAll('[data-edit]').forEach((btn) => btn.addEventListener('click', () => openForm(events.find((e) => e.id === btn.dataset.edit))));
        tbody.querySelectorAll('[data-delete]').forEach((btn) => btn.addEventListener('click', () => handleDelete(events.find((e) => e.id === btn.dataset.delete))));
        tbody.querySelectorAll('[data-toggle]').forEach((input) => input.addEventListener('change', () => togglePublished(events.find((e) => e.id === input.dataset.id), input.dataset.toggle)));
      } catch (err) {
        tbody.innerHTML = '<tr><td colspan="7" class="state-msg">Could not load events.</td></tr>';
        toastError(err);
      }
    }

    loadEvents();
  </script>
</body>
</html>
